<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bananasrlowkeygood</title>
  <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="home">
    <div class="intro">
      <div class="graphic"></div>
      <h1>bananasrlowkeygood</h1>
      <div class="img-shields">
        <a href="https://github.com/bananasrlowkeygood/bananasrlowkeygood.github.io/issues"><img src="https://img.shields.io/badge/banana%20status-lowkey%20good-yellow?style=flat-square" alt="Status"></a>
        <a href="https://github.com/bananasrlowkeygood/bananasrlowkeygood.github.io/"><img src="https://img.shields.io/badge/version-v3.14.15-blueviolet?style=flat-square" alt="Version"></a>
        <a href="https://github.com/bananasrlowkeygood/bananasrlowkeygood.github.io/blob/main/LICENSE"><img src="https://img.shields.io/github/license/bananasrlowkeygood/bananasrlowkeygood?style=flat-square&color=red" alt="License"></a>
      </div>
      <p>personal file hosting.</p>
<div class="url-bar-container">
        <form class="url-bar" onsubmit="redirectToURL(event)">
            <input type="text" id="input-path" placeholder="Enter a relative path." autocomplete="off" list="path-suggestions" />
            <datalist id="path-suggestions"></datalist>
            <button type="submit">Go</button>
        </form>
      </div>
    </div>

    <script>
        async function loadPaths() {
            try {
                const res = await fetch("https://api.github.com/repos/bananasrlowkeygood/bananasrlowkeygood.github.io/git/trees/main?recursive=1");
                const data = await res.json();
                const datalist = document.getElementById("path-suggestions");
                data.tree
                    .filter(item => item.type === "blob")
                    .forEach(item => {
                        const option = document.createElement("option");
                        option.value = "./" + item.path;
                        datalist.appendChild(option);
                    });
            } catch (e) {
                // silently fail — autocomplete is a nice-to-have
            }
        }

        function redirectToURL(event) {
            event.preventDefault();
            const baseURL = "https://bananasrlowkeygood.github.io/";
            const inputPath = document.getElementById("input-path").value.trim();
            if (!inputPath) {
                alert("You didn't type anything!");
                return;
            }
            if (!inputPath.startsWith('./')) {
                alert("Huh? Relative paths start with ./");
                return;
            }
            const sanitizedPath = inputPath.slice(2);
            const fullURL = baseURL + sanitizedPath;
            window.location.href = fullURL;
        }

        loadPaths();
    </script>
  </main>
</body>
</html>
